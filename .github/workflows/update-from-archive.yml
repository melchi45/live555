name: Update from remote archive

on:
  schedule:
    - cron: "0 3 * * *"   # Runs daily at 3:00 AM (UTC)
  workflow_dispatch:      # Also allows manual execution

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: feature/origin   # Target branch to update
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and extract archive
        run: |
          # Download and extract entirely outside the workspace so that rsync's
          # source tree never overlaps with the destination (".").  Keeping them
          # in "." caused rsync --delete to delete its own source files mid-run,
          # producing "file has vanished" warnings and exit code 24.
          curl -L "https://download.live555.com/live555-latest.tar.gz" \
            -o /tmp/live555-latest.tar.gz
          mkdir -p /tmp/live555_extracted
          tar -xf /tmp/live555-latest.tar.gz -C /tmp/live555_extracted

          ARCHIVE_ROOT=$(tar -tzf /tmp/live555-latest.tar.gz \
            | head -1 | cut -f1 -d"/")
          echo "ARCHIVE_ROOT=$ARCHIVE_ROOT" >> "$GITHUB_ENV"

      - name: Check diff between repo and extracted archive
        id: diff_check
        run: |
          # Exclude repo-specific additions that are not part of the upstream
          # archive; without this they would always trigger has_changes=true.
          DIFF_EXCLUDES=(
            --exclude=".git"
            --exclude=".github"
            --exclude="CMakePresets.json"
            --exclude="toolchains"
            --exclude="cmake"
          )

          if diff -rq "${DIFF_EXCLUDES[@]}" \
               "/tmp/live555_extracted/$ARCHIVE_ROOT/" . \
               > /dev/null 2>&1; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No differences found. Skipping update."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Differences detected:"
            diff -rq "${DIFF_EXCLUDES[@]}" \
              "/tmp/live555_extracted/$ARCHIVE_ROOT/" . || true
          fi

      - name: Copy extracted files into repo
        if: steps.diff_check.outputs.has_changes == 'true'
        run: |
          # Source is outside the workspace — rsync --delete can no longer
          # touch its own source tree, so "file has vanished" / exit 24 cannot
          # occur from that cause.
          # Repo-specific additions are excluded so they are never deleted.
          #
          # Note: rsync_rc pattern (not plain $?) is required because GitHub
          # Actions runs scripts with "set -e"; a non-zero rsync exit would
          # abort the script before a bare "rsync_rc=$?" could run.
          rsync_rc=0
          rsync -av --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="CMakePresets.json" \
            --exclude="toolchains" \
            --exclude="cmake" \
            "/tmp/live555_extracted/$ARCHIVE_ROOT/" . || rsync_rc=$?

          # Treat exit code 24 ("some source files vanished") as a warning;
          # fail only on genuine errors.
          if [ "$rsync_rc" -ne 0 ] && [ "$rsync_rc" -ne 24 ]; then
            echo "rsync failed with exit code $rsync_rc"
            exit "$rsync_rc"
          fi

      - name: Commit changes
        if: steps.diff_check.outputs.has_changes == 'true'
        run: |
          git config user.name "melchi45"
          git config user.email "melchi45@gmail.com"
          git add .
          git commit -m "Update from remote archive $(date +'%Y-%m-%d')"

      - name: Push changes
        if: steps.diff_check.outputs.has_changes == 'true'
        run: |
          git push origin feature/origin
